run:
  timeout: 3m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - ineffassign
    - gofumpt
    - goimports
    - misspell
    - unused

linters-settings:
  gofumpt:
    extra-rules: true
  goimports:
    local-prefixes: github.com/sasha/remotelauncher

issues:
  exclude-dirs:
    - testdata
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
