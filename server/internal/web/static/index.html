<!doctype html>
<html lang="ru" data-theme="night">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>RemoteLauncher — Admin</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <script
      defer
      src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"
    ></script>
    <style>
      html,
      body {
        height: 100%;
      }
      body {
        background: radial-gradient(
            1200px 600px at 15% -10%,
            rgba(120, 119, 198, 0.2),
            transparent 60%
          ),
          radial-gradient(
            900px 500px at 85% 120%,
            rgba(255, 120, 180, 0.12),
            transparent 60%
          ),
          hsl(var(--b2));
      }
      .app-card {
        transition:
          transform 120ms ease,
          box-shadow 120ms ease,
          opacity 120ms ease;
      }
      .app-card:hover {
        transform: translateY(-2px);
      }
      .app-card.is-hidden {
        opacity: 0.45;
      }
      .icon-fallback {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 56px;
        height: 56px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.5);
        font-size: 24px;
        font-weight: 600;
        flex-shrink: 0;
      }
      .icon-img {
        width: 56px;
        height: 56px;
        border-radius: 12px;
        object-fit: contain;
        background: rgba(255, 255, 255, 0.04);
        padding: 6px;
        flex-shrink: 0;
      }
      .icon-shortcut {
        background: linear-gradient(135deg, #4b70e0, #8c4fff);
        color: #fff;
      }
    </style>
  </head>
  <body class="min-h-screen text-base-content">
    <div
      x-data="adminApp()"
      x-init="load()"
      class="mx-auto max-w-6xl px-4 pb-16 pt-8"
    >
      <header class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <h1 class="text-3xl font-bold tracking-tight">RemoteLauncher</h1>
          <p class="mt-1 text-sm opacity-70">
            Админка сервера — фильтрация приложений и пользовательские ярлыки
          </p>
        </div>
        <div class="flex flex-wrap items-center gap-2">
          <div class="badge badge-ghost gap-2">
            <span x-text="apps.length"></span>
            <span class="opacity-60">всего</span>
          </div>
          <div class="badge badge-primary gap-2">
            <span x-text="visibleCount"></span>
            <span class="opacity-80">видно</span>
          </div>
          <div class="badge badge-warning gap-2">
            <span x-text="hiddenCount"></span>
            <span class="opacity-80">скрыто</span>
          </div>
        </div>
      </header>

      <!-- PIN CARD -->
      <div class="card card-compact bg-base-200/60 shadow mb-5">
        <div class="card-body flex-row items-center justify-between gap-4 flex-wrap">
          <div class="flex items-center gap-4">
            <span class="text-sm opacity-70">PIN для подключения:</span>
            <span class="font-mono text-2xl font-bold tracking-widest" x-text="pin.code || '—'"></span>
            <template x-if="pin.consumed">
              <span class="badge badge-error">использован</span>
            </template>
            <template x-if="!pin.consumed && pin.expired">
              <span class="badge badge-warning">истёк</span>
            </template>
            <template x-if="!pin.consumed && !pin.expired && pin.code">
              <span class="badge badge-success" x-text="'ещё ' + pin.remaining"></span>
            </template>
          </div>
          <button class="btn btn-primary btn-sm" x-on:click="newPin()">Новый PIN</button>
        </div>
      </div>

      <div role="tablist" class="tabs tabs-boxed mb-5 self-start">
        <button
          role="tab"
          class="tab"
          :class="tab === 'apps' ? 'tab-active' : ''"
          x-on:click="tab = 'apps'"
        >
          Приложения
        </button>
        <button
          role="tab"
          class="tab"
          :class="tab === 'shortcuts' ? 'tab-active' : ''"
          x-on:click="tab = 'shortcuts'"
        >
          Ярлыки
          <span class="badge badge-sm ml-2" x-text="shortcuts.length"></span>
        </button>
      </div>

      <!-- APPS TAB -->
      <section x-show="tab === 'apps'">
        <div class="mb-5 flex flex-col gap-3 sm:flex-row sm:items-center">
          <label class="input input-bordered flex flex-1 items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4 opacity-60">
              <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 1 0 3.36 9.85l3.14 3.15a.75.75 0 1 0 1.06-1.06l-3.15-3.14A5.5 5.5 0 0 0 9 3.5zM5 9a4 4 0 1 1 8 0 4 4 0 0 1-8 0z" clip-rule="evenodd"/>
            </svg>
            <input type="text" class="grow" placeholder="Поиск по имени или id..." x-model="query" />
            <kbd class="kbd kbd-sm" x-show="query" x-on:click="query = ''">×</kbd>
          </label>
          <div class="join">
            <button class="btn join-item btn-sm" :class="filter === 'all' ? 'btn-active' : ''" x-on:click="filter = 'all'">Все</button>
            <button class="btn join-item btn-sm" :class="filter === 'visible' ? 'btn-active' : ''" x-on:click="filter = 'visible'">Видимые</button>
            <button class="btn join-item btn-sm" :class="filter === 'hidden' ? 'btn-active' : ''" x-on:click="filter = 'hidden'">Скрытые</button>
          </div>
        </div>

        <div class="rounded-xl border border-base-300/60 bg-base-100/40 p-3 shadow-sm backdrop-blur">
          <template x-if="loading">
            <div class="flex justify-center py-20">
              <span class="loading loading-spinner loading-lg text-primary"></span>
            </div>
          </template>
          <template x-if="!loading && filteredApps.length === 0">
            <div class="py-16 text-center opacity-60">
              <p class="text-lg">Ничего не найдено</p>
              <p class="mt-1 text-sm">Попробуй другой запрос или фильтр</p>
            </div>
          </template>
          <div
            x-show="!loading && filteredApps.length > 0"
            class="grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-3"
          >
            <template x-for="app in filteredApps" :key="app.id">
              <div
                class="app-card flex items-center gap-3 rounded-lg border border-base-300/60 bg-base-100 p-3 shadow-sm"
                :class="app.hidden ? 'is-hidden' : ''"
              >
                <template x-if="app.has_icon">
                  <img
                    class="icon-img"
                    :src="'api/apps/' + encodeURIComponent(app.id) + '/icon?size=96'"
                    :alt="app.name"
                    loading="lazy"
                    x-on:error="app.has_icon = false"
                  />
                </template>
                <template x-if="!app.has_icon">
                  <div class="icon-fallback" :class="app.shortcut ? 'icon-shortcut' : ''" x-text="shortcutIcon(app)"></div>
                </template>
                <div class="min-w-0 flex-1">
                  <div class="flex items-center gap-2">
                    <div class="truncate text-base font-semibold" x-text="app.name"></div>
                    <span x-show="app.shortcut" class="badge badge-xs badge-secondary">ярлык</span>
                  </div>
                  <div class="truncate text-xs opacity-60" x-text="app.id"></div>
                  <template x-if="app.comment">
                    <div class="mt-0.5 truncate text-xs opacity-50" x-text="app.comment"></div>
                  </template>
                </div>
                <label class="swap swap-flip cursor-pointer" :title="app.hidden ? 'Показать' : 'Скрыть'">
                  <input type="checkbox" :checked="!app.hidden" x-on:change="toggleVisibility(app)" />
                  <div class="swap-on text-success">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="h-7 w-7"><path d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/></svg>
                  </div>
                  <div class="swap-off opacity-60">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="h-7 w-7"><path d="M2.27 3.72 3.68 2.3 21.7 20.32l-1.41 1.41-3.1-3.1A12.7 12.7 0 0 1 12 19c-7 0-10-7-10-7a17 17 0 0 1 4.22-5.36L2.27 3.72zM12 7c-.37 0-.72.04-1.07.11l7 7c.07-.35.11-.7.11-1.07a6 6 0 0 0-6-6zm0-2c7 0 10 7 10 7a16.47 16.47 0 0 1-3.1 4.3l-1.43-1.43A14.6 14.6 0 0 0 19.67 12C18.93 10.74 16.4 7 12 7l-1.5.08-1.6-1.6C9.52 5.17 10.73 5 12 5z"/></svg>
                  </div>
                </label>
              </div>
            </template>
          </div>
        </div>
      </section>

      <!-- SHORTCUTS TAB -->
      <section x-show="tab === 'shortcuts'">
        <div class="mb-5 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
          <div class="text-sm opacity-70">
            Кастомные ярлыки — команда, которая открывается в терминале с указанной папкой. Удобно для
            <span class="font-mono">claude</span>, <span class="font-mono">vim</span> и т.п. в конкретных проектах.
          </div>
          <button class="btn btn-primary btn-sm" x-on:click="openShortcutForm(null)">
            + Новый ярлык
          </button>
        </div>

        <div class="rounded-xl border border-base-300/60 bg-base-100/40 p-3 shadow-sm backdrop-blur">
          <template x-if="shortcuts.length === 0">
            <div class="py-16 text-center opacity-60">
              <p class="text-lg">Пока нет ярлыков</p>
              <p class="mt-1 text-sm">Нажми «+ Новый ярлык», чтобы добавить первый</p>
            </div>
          </template>
          <div class="grid grid-cols-1 gap-3 sm:grid-cols-2" x-show="shortcuts.length > 0">
            <template x-for="sc in shortcuts" :key="sc.id">
              <div class="app-card rounded-lg border border-base-300/60 bg-base-100 p-4 shadow-sm">
                <div class="flex items-start gap-3">
                  <div class="icon-fallback icon-shortcut" x-text="sc.icon || shortcutIcon({shortcut: true, name: sc.name})"></div>
                  <div class="min-w-0 flex-1">
                    <div class="text-base font-semibold" x-text="sc.name"></div>
                    <div class="truncate font-mono text-xs opacity-70" x-text="sc.command"></div>
                    <div class="truncate text-xs opacity-50" x-show="sc.cwd">
                      <span class="opacity-60">папка:</span>
                      <span x-text="sc.cwd"></span>
                    </div>
                    <div class="truncate text-xs opacity-50">
                      <span class="opacity-60">терминал:</span>
                      <span x-text="sc.terminal || ('(по умолчанию: ' + (defaultTerminal || 'авто') + ')')"></span>
                    </div>
                  </div>
                </div>
                <div class="mt-3 flex justify-end gap-2">
                  <button class="btn btn-ghost btn-sm" x-on:click="openShortcutForm(sc)">Редактировать</button>
                  <button class="btn btn-ghost btn-sm text-error" x-on:click="deleteShortcut(sc)">Удалить</button>
                </div>
              </div>
            </template>
          </div>
        </div>

        <!-- FORM MODAL -->
        <dialog class="modal" :class="formOpen ? 'modal-open' : ''" x-show="formOpen">
          <div class="modal-box max-w-lg">
            <h3 class="text-lg font-bold" x-text="formEditing ? 'Редактировать ярлык' : 'Новый ярлык'"></h3>
            <div class="mt-4 space-y-3">
              <label class="form-control">
                <div class="label">
                  <span class="label-text">ID <span class="opacity-50">(только латиница, без пробелов)</span></span>
                </div>
                <input
                  class="input input-bordered"
                  x-model="form.id"
                  :disabled="formEditing"
                  placeholder="claude-myproj"
                />
              </label>
              <label class="form-control">
                <div class="label">
                  <span class="label-text">Название</span>
                </div>
                <input class="input input-bordered" x-model="form.name" placeholder="Claude: MyProj" />
              </label>
              <label class="form-control">
                <div class="label">
                  <span class="label-text">Команда</span>
                </div>
                <input class="input input-bordered font-mono" x-model="form.command" placeholder="claude" />
              </label>
              <label class="form-control">
                <div class="label">
                  <span class="label-text">Рабочая папка <span class="opacity-50">(опционально)</span></span>
                </div>
                <input class="input input-bordered font-mono" x-model="form.cwd" placeholder="/home/sasha/WORK/MyProj" />
              </label>
              <label class="form-control">
                <div class="label">
                  <span class="label-text">Терминал</span>
                </div>
                <select class="select select-bordered" x-model="form.terminal">
                  <option value="">(по умолчанию: <span x-text="defaultTerminal || 'авто'"></span>)</option>
                  <template x-for="t in supportedTerminals" :key="t">
                    <option :value="t" x-text="t"></option>
                  </template>
                </select>
              </label>
              <label class="form-control">
                <div class="label">
                  <span class="label-text">Иконка <span class="opacity-50">(эмодзи или буква, по умолчанию — первая буква названия)</span></span>
                </div>
                <input class="input input-bordered" x-model="form.icon" placeholder="🤖" maxlength="4" />
              </label>
            </div>

            <div class="modal-action">
              <button class="btn btn-ghost" x-on:click="closeShortcutForm()">Отмена</button>
              <button class="btn btn-primary" x-on:click="saveShortcut()" :disabled="!canSaveShortcut">Сохранить</button>
            </div>
          </div>
          <form method="dialog" class="modal-backdrop"><button x-on:click="closeShortcutForm()">close</button></form>
        </dialog>
      </section>

      <!-- TOAST -->
      <div class="toast toast-end toast-bottom" x-show="toast.visible" x-transition>
        <div class="alert" :class="toast.kind === 'error' ? 'alert-error' : 'alert-success'">
          <span x-text="toast.text"></span>
        </div>
      </div>
    </div>

    <script>
      function adminApp() {
        return {
          apps: [],
          shortcuts: [],
          supportedTerminals: [],
          defaultTerminal: "",
          loading: true,
          query: "",
          filter: "all",
          tab: "apps",
          pin: { code: "", consumed: false, expired: false, remaining: "" },
          pinTimer: null,
          toast: { visible: false, text: "", kind: "success" },
          toastTimer: null,
          formOpen: false,
          formEditing: false,
          form: { id: "", name: "", command: "", cwd: "", terminal: "", icon: "" },

          get filteredApps() {
            const q = this.query.trim().toLowerCase();
            return this.apps.filter((a) => {
              if (this.filter === "visible" && a.hidden) return false;
              if (this.filter === "hidden" && !a.hidden) return false;
              if (!q) return true;
              return (
                a.name.toLowerCase().includes(q) ||
                a.id.toLowerCase().includes(q) ||
                (a.comment && a.comment.toLowerCase().includes(q))
              );
            });
          },
          get visibleCount() {
            return this.apps.filter((a) => !a.hidden).length;
          },
          get hiddenCount() {
            return this.apps.filter((a) => a.hidden).length;
          },
          get canSaveShortcut() {
            return (
              this.form.id.trim() &&
              this.form.name.trim() &&
              this.form.command.trim() &&
              /^[A-Za-z0-9_.-]+$/.test(this.form.id.trim())
            );
          },

          shortcutIcon(app) {
            if (app.shortcut) return "⚡";
            return (app.name || "?").trim().charAt(0).toUpperCase();
          },

          updatePinRemaining(expiresAt) {
            if (this.pinTimer) clearInterval(this.pinTimer);
            const update = () => {
              const left = Math.max(0, Math.floor((new Date(expiresAt) - Date.now()) / 1000));
              if (left <= 0) { this.pin.expired = true; this.pin.remaining = ""; clearInterval(this.pinTimer); return; }
              const m = Math.floor(left / 60), s = left % 60;
              this.pin.remaining = m + ":" + String(s).padStart(2, "0");
            };
            update();
            this.pinTimer = setInterval(update, 1000);
          },

          async loadPin() {
            try {
              const res = await fetch("api/pin");
              if (!res.ok) return;
              const d = await res.json();
              this.pin.code = d.pin;
              this.pin.consumed = d.consumed;
              this.pin.expired = d.expired;
              if (!d.consumed && !d.expired) this.updatePinRemaining(d.expires_at);
            } catch (_) {}
          },

          async newPin() {
            try {
              const res = await fetch("api/pin", { method: "POST" });
              if (!res.ok) throw new Error("status " + res.status);
              const d = await res.json();
              this.pin.code = d.pin;
              this.pin.consumed = d.consumed;
              this.pin.expired = d.expired;
              this.updatePinRemaining(d.expires_at);
              this.showToast("Новый PIN: " + d.pin, "success");
            } catch (e) {
              this.showToast("Ошибка: " + e.message, "error");
            }
          },

          async load() {
            this.loading = true;
            this.loadPin();
            try {
              const [appsRes, scRes] = await Promise.all([
                fetch("api/apps"),
                fetch("api/shortcuts"),
              ]);
              if (!appsRes.ok) throw new Error("apps " + appsRes.status);
              if (!scRes.ok) throw new Error("shortcuts " + scRes.status);
              const appsList = await appsRes.json();
              const scData = await scRes.json();
              this.apps = appsList.map((a) => ({ ...a, has_icon: !!a.has_icon }));
              this.shortcuts = scData.shortcuts || [];
              this.supportedTerminals = scData.supported_terminals || [];
              this.defaultTerminal = scData.default_terminal || "";
            } catch (e) {
              this.showToast("Не удалось загрузить: " + e.message, "error");
              this.apps = [];
              this.shortcuts = [];
            } finally {
              this.loading = false;
            }
          },

          async toggleVisibility(app) {
            app.hidden = !app.hidden;
            const hidden = this.apps.filter((a) => a.hidden).map((a) => a.id);
            try {
              const res = await fetch("api/visibility", {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ hidden }),
              });
              if (!res.ok) throw new Error("status " + res.status);
              this.showToast(
                app.hidden ? `Скрыто: ${app.name}` : `Показано: ${app.name}`,
                "success",
              );
            } catch (e) {
              app.hidden = !app.hidden;
              this.showToast("Не сохранилось: " + e.message, "error");
            }
          },

          openShortcutForm(sc) {
            if (sc) {
              this.formEditing = true;
              this.form = {
                id: sc.id,
                name: sc.name,
                command: sc.command,
                cwd: sc.cwd || "",
                terminal: sc.terminal || "",
                icon: sc.icon || "",
              };
            } else {
              this.formEditing = false;
              this.form = { id: "", name: "", command: "", cwd: "", terminal: "", icon: "" };
            }
            this.formOpen = true;
          },

          closeShortcutForm() {
            this.formOpen = false;
          },

          async saveShortcut() {
            const trimmed = {
              id: this.form.id.trim(),
              name: this.form.name.trim(),
              command: this.form.command.trim(),
              cwd: this.form.cwd.trim(),
              terminal: this.form.terminal.trim(),
              icon: this.form.icon.trim(),
            };
            let next;
            if (this.formEditing) {
              next = this.shortcuts.map((s) => (s.id === trimmed.id ? trimmed : s));
            } else {
              if (this.shortcuts.some((s) => s.id === trimmed.id)) {
                this.showToast(`Ярлык с id "${trimmed.id}" уже есть`, "error");
                return;
              }
              next = [...this.shortcuts, trimmed];
            }
            await this.putShortcuts(next, `Сохранено: ${trimmed.name}`);
            this.formOpen = false;
          },

          async deleteShortcut(sc) {
            if (!confirm(`Удалить ярлык "${sc.name}"?`)) return;
            const next = this.shortcuts.filter((s) => s.id !== sc.id);
            await this.putShortcuts(next, `Удалено: ${sc.name}`);
          },

          async putShortcuts(next, successMsg) {
            try {
              const res = await fetch("api/shortcuts", {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ shortcuts: next }),
              });
              if (!res.ok) {
                const body = await res.json().catch(() => ({}));
                throw new Error(body.error?.message || ("status " + res.status));
              }
              const data = await res.json();
              this.shortcuts = data.shortcuts || next;
              await this.load(); // обновить apps tab на случай если ярлык там виден
              this.showToast(successMsg, "success");
            } catch (e) {
              this.showToast("Не сохранилось: " + e.message, "error");
            }
          },

          showToast(text, kind) {
            this.toast = { visible: true, text, kind };
            if (this.toastTimer) clearTimeout(this.toastTimer);
            this.toastTimer = setTimeout(() => {
              this.toast.visible = false;
            }, 2400);
          },
        };
      }
    </script>
  </body>
</html>
