<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>RemoteLauncher — Terminal</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; background: #1e1e2e; overflow: hidden; }
      #terminal { height: 100%; width: 100%; }
      .xterm { height: 100%; }
      #status {
        position: fixed; top: 8px; right: 12px;
        font-family: monospace; font-size: 12px;
        color: #6c7086; z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="status"></div>
    <div id="terminal"></div>
    <script>
      (function () {
        const statusEl = document.getElementById("status");
        statusEl.textContent = "loading…";

        try {

        if (!window.Terminal) {
          statusEl.textContent = "error: xterm.js not loaded from CDN";
          return;
        }

        const term = new window.Terminal({
          cursorBlink: true,
          fontSize: 14,
          fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace",
          theme: {
            background: "#1e1e2e",
            foreground: "#cdd6f4",
            cursor: "#f5e0dc",
            selectionBackground: "#585b70",
          },
        });
        const fitAddon = new window.FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById("terminal"));
        fitAddon.fit();

        window.addEventListener("resize", function () {
          fitAddon.fit();
        });

        // ── Android bridge mode ────────────────────────────────
        // When loaded inside the Android WebView, the Kotlin app
        // injects "AndroidBridge" which manages the WebSocket
        // connection on the native side (bypassing WebView's SSL
        // limitation for self-signed certs). Data is Base64-encoded.
        if (window.AndroidBridge) {
          statusEl.textContent = "connecting…";

          window._onOpen = function () {
            statusEl.textContent = "";
            AndroidBridge.resize(term.cols, term.rows);
          };

          window._onData = function (b64) {
            const raw = atob(b64);
            const bytes = new Uint8Array(raw.length);
            for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
            term.write(bytes);
          };

          window._onError = function (msg) {
            statusEl.textContent = "error: " + msg;
          };

          term.onData(function (data) {
            AndroidBridge.sendInput(btoa(data));
          });

          term.onResize(function (size) {
            AndroidBridge.resize(size.cols, size.rows);
          });

          AndroidBridge.connect();
          return;
        }

        // ── Desktop browser mode ───────────────────────────────
        // Direct WebSocket — works when the browser trusts the cert
        // (e.g. after clicking through the self-signed warning).
        const wsProto = location.protocol === "https:" ? "wss:" : "ws:";
        const wsUrl = wsProto + "//" + location.host + "/terminal/ws";
        let ws;

        function connect() {
          statusEl.textContent = "connecting…";
          ws = new WebSocket(wsUrl);
          ws.binaryType = "arraybuffer";

          ws.onopen = function () {
            statusEl.textContent = "";
            ws.send(
              JSON.stringify({
                type: "resize",
                cols: term.cols,
                rows: term.rows,
              })
            );
          };

          ws.onmessage = function (ev) {
            if (ev.data instanceof ArrayBuffer) {
              term.write(new Uint8Array(ev.data));
            } else {
              term.write(ev.data);
            }
          };

          ws.onclose = function () {
            statusEl.textContent = "disconnected — reconnecting…";
            setTimeout(connect, 2000);
          };

          ws.onerror = function () {
            ws.close();
          };
        }

        term.onData(function (data) {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(new TextEncoder().encode(data));
          }
        });

        term.onResize(function (size) {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(
              JSON.stringify({
                type: "resize",
                cols: size.cols,
                rows: size.rows,
              })
            );
          }
        });

        connect();

        } catch (e) {
          statusEl.textContent = "JS error: " + e.message;
        }
      })();
    </script>
  </body>
</html>
